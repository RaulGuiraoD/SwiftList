{% extends 'layouts/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <a href="{% url 'dashboard' %}" class="btn btn-light rounded-circle">‹</a>
            <h4 class="fw-bold mb-0">Mis Productos 🧠</h4>
            <div style="width: 40px;"></div>
        </div>

        <form method="GET" class="mb-4">
            <input type="text" name="q" class="form-control border-0 shadow-sm py-3 px-4" 
                   placeholder="Buscar producto..." style="border-radius: 15px;">
        </form>

        <div class="card border-0 shadow-sm" style="border-radius: 20px;">
            <div class="list-group list-group-flush">
                {% for p in productos %}
                <div class="list-group-item d-flex justify-content-between align-items-center py-3">
                    <div>
                        <span class="fw-bold">{{ p.nombre }}</span>
                        <small class="text-muted d-block">Usado {{ p.frecuencia_uso }} veces</small>
                    </div>
                    <form method="POST" action="{% url 'eliminar_producto_maestro' p.id %}" onsubmit="return confirm('Si borras esto, ya no saldrá en las sugerencias. ¿Ok?');">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-sm btn-outline-danger border-0">Borrar</button>
                    </form>
                </div>
                {% empty %}
                <p class="text-center p-4">No hay productos guardados.</p>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
