{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}MarketList{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="apple-touch-icon" href="{% static 'img/mi-logo.png' %}">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

</head>
<body>
    <div class="wrapper-auth">
        <div class="auth-card-container">
            <div class="text-center mb-4">
                <img src="{% static 'assets/SwiftListLogo.png' %}" alt="SwiftList" class="auth-logo mb-2">
                <h1 class="h3 fw-bold" style="color: var(--primary-green);">
                    Swift<span style="color: var(--text-dark);">List</span>
                </h1>
            </div>
            
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    {% block auth_content %}{% endblock %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
