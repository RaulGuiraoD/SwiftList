{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Acceso - Mi Compra{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; }
        .auth-card { width: 100%; max-width: 400px; padding: 15px; margin: auto; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="text-center mb-4">
            <h1 class="h3 mb-3 fw-normal">🛒 Mi Compra</h1>
        </div>
        <div class="card shadow-sm">
            <div class="card-body p-4">
                {% block auth_content %}{% endblock %}
            </div>
        </div>
        <p class="mt-5 mb-3 text-muted text-center">&copy; 2024-2026</p>
    </div>
</body>
</html>
